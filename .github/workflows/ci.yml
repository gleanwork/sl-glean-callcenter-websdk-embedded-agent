name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate static site
        run: npm run check

      - name: Audit runtime dependencies
        run: npm run audit

      - name: Build CDK app
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Synthesize CDK template
        run: npm run cdk:synth
